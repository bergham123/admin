<!DOCTYPE html>
<html>
<head>
  <title>لوحة الأدمن</title>
  <meta charset="utf-8">
  <style>
    body { font-family: Arial; max-width: 1200px; margin: 20px auto; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    .section { margin: 20px 0; padding: 15px; background: #f9f9f9; }
    textarea { width: 100%; height: 60px; }
  </style>
</head>
<body>
  <h1>لوحة الأدمن</h1>
  <button onclick="logout()">تسجيل خروج</button>

  <div class="section">
    <h2>إضافة بوت جديد</h2>
    <input id="newBotName" placeholder="اسم المستودع (مثل whatsapp-bot-6)" />
    <button onclick="addBot()">إضافة</button>
    <button onclick="confirmBot()">تأكيد الربط (بعد مسح QR)</button>
    <div id="botMsg"></div>
  </div>

  <div class="section">
    <h2>قائمة البوتات</h2>
    <table id="botsTable"><thead><tr><th>الاسم</th><th>متاح</th><th>محجوز لـ</th><th>إجراء</th></tr></thead><tbody></tbody></table>
  </div>

  <div class="section">
    <h2>قائمة المستخدمين</h2>
    <table id="usersTable"><thead><tr><th>البريد</th><th>البوت المحجوز</th><th>الأرقام</th><th>الرسائل</th><th>الجدولة</th><th>إجراء</th></tr></thead><tbody></tbody></table>
  </div>

  <script>
    const token = localStorage.getItem('token');
    if (!token) location.href = '/';

    async function apiGet(url) {
      const res = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
      return await res.json();
    }
    async function apiPost(url, data) {
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify(data)
      });
      return await res.json();
    }
    async function apiPut(url, data) {
      const res = await fetch(url, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify(data)
      });
      return await res.json();
    }
    async function apiDelete(url, data) {
      const res = await fetch(url, {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify(data)
      });
      return await res.json();
    }

    // تحميل البوتات
    async function loadBots() {
      const bots = await apiGet('/api/admin/bots');
      const tbody = document.querySelector('#botsTable tbody');
      tbody.innerHTML = '';
      bots.forEach(b => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${b.name}</td>
          <td>${b.available ? '✅' : '❌'}</td>
          <td>${b.reserved_by || '-'}</td>
          <td><button onclick="deleteBot('${b.name}')">حذف</button></td>
        `;
        tbody.appendChild(tr);
      });
    }

    // تحميل المستخدمين
    async function loadUsers() {
      const users = await apiGet('/api/admin/users');
      const tbody = document.querySelector('#usersTable tbody');
      tbody.innerHTML = '';
      users.forEach(u => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${u.email}</td>
          <td>${u.reserved_bot || '-'}</td>
          <td><textarea readonly>${JSON.stringify(u.accounts)}</textarea></td>
          <td><textarea readonly>${JSON.stringify(u.messages)}</textarea></td>
          <td>${u.schedule || '-'}</td>
          <td><button onclick="deleteUser('${u.email}')">حذف</button></td>
        `;
        tbody.appendChild(tr);
      });
    }

    // إضافة بوت
    async function addBot() {
      const botName = document.getElementById('newBotName').value.trim();
      if (!botName) return alert('أدخل اسم المستودع');
      const res = await apiPost('/api/admin/bots', { botName });
      document.getElementById('botMsg').innerText = res.message || res.error || 'تم';
      loadBots();
    }

    // تأكيد الربط
    async function confirmBot() {
      const botName = document.getElementById('newBotName').value.trim();
      if (!botName) return alert('أدخل اسم المستودع');
      const res = await apiPost('/api/admin/confirm-bot', { botName });
      document.getElementById('botMsg').innerText = res.message || res.error || 'تم';
      loadBots();
    }

    // حذف بوت
    async function deleteBot(botName) {
      if (!confirm(`تأكيد حذف البوت ${botName}؟`)) return;
      const res = await apiDelete('/api/admin/bots', { botName });
      alert(res.message || res.error || 'تم الحذف');
      loadBots();
    }

    // حذف مستخدم
    async function deleteUser(email) {
      if (!confirm(`تأكيد حذف المستخدم ${email}؟`)) return;
      const res = await apiDelete('/api/admin/users', { email });
      alert(res.message || res.error || 'تم الحذف');
      loadUsers();
    }

    function logout() {
      localStorage.removeItem('token');
      location.href = '/';
    }

    loadBots();
    loadUsers();
  </script>
</body>
</html>
